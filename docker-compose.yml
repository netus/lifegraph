services:
  lifegraph_db:
    image: postgres:17-alpine
    container_name: lifegraph_db
    restart: unless-stopped
    volumes:
      - lifegraph_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifegraph_user -d lifegraph_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    networks:
      - lifegraph_network

  lifegraph_redis:
    image: redis:7-alpine
    container_name: lifegraph_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - lifegraph_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    networks:
      - lifegraph_network

  lifegraph_web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: prod
      args:
        GIT_COMMIT: "${GIT_COMMIT:-}"
    container_name: lifegraph_web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      lifegraph_db:
        condition: service_healthy
      lifegraph_redis:
        condition: service_healthy
    entrypoint: ["entrypoint.sh"]
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    networks:
      - lifegraph_network

volumes:
  lifegraph_postgres_data:
    name: lifegraph_postgres_data
  lifegraph_redis_data:
    name: lifegraph_redis_data
  lifegraph_backup_data:
    name: lifegraph_backup_data
  lifegraph_media_data:
    name: lifegraph_media_data
  lifegraph_static_data:
    name: lifegraph_static_data
  lifegraph_caddy_data:
    name: lifegraph_caddy_data
  lifegraph_caddy_config:
    name: lifegraph_caddy_config
  lifegraph_certs_data:
    name: lifegraph_certs_data

networks:
  lifegraph_network:
    name: lifegraph_network
