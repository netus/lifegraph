{% extends 'admin/base_site.html' %}
{% load i18n %}

{% block title %}LifeGraph{% endblock %}

{% block content %}
<div class="flex flex-col gap-6 py-2">
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;">
    <a href="{% url 'admin:lifegraph_lifenode_changelist' %}" style="text-decoration:none;">
      <div style="background:var(--body-bg,#fff);border:1px solid var(--border-color,#c3c4c7);border-radius:8px;padding:18px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="material-symbols-outlined" style="font-size:24px;color:#176b5b;">timeline</span>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--body-fg,#1d2327);">人生节点</div>
            <div style="font-size:12px;color:var(--body-quiet-color,#787c82);">管理 LifeNode 时间线数据</div>
          </div>
        </div>
      </div>
    </a>
    <a href="{% url 'admin:lifegraph_nodeparticipant_changelist' %}" style="text-decoration:none;">
      <div style="background:var(--body-bg,#fff);border:1px solid var(--border-color,#c3c4c7);border-radius:8px;padding:18px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="material-symbols-outlined" style="font-size:24px;color:#4f46e5;">group</span>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--body-fg,#1d2327);">参与者</div>
            <div style="font-size:12px;color:var(--body-quiet-color,#787c82);">管理节点与人的关系</div>
          </div>
        </div>
      </div>
    </a>
    <a href="{% url 'admin:auth_user_changelist' %}" style="text-decoration:none;">
      <div style="background:var(--body-bg,#fff);border:1px solid var(--border-color,#c3c4c7);border-radius:8px;padding:18px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="material-symbols-outlined" style="font-size:24px;color:#475467;">person</span>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--body-fg,#1d2327);">用户</div>
            <div style="font-size:12px;color:var(--body-quiet-color,#787c82);">管理登录账号和权限</div>
          </div>
        </div>
      </div>
    </a>
  </div>
</div>
{% endblock %}
