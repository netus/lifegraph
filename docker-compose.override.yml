name: lifegraph_local_dev

services:
  lifegraph_db:
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifegraph_db}
      POSTGRES_USER: ${POSTGRES_USER:-lifegraph_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifegraph_password}
    ports:
      - "${DB_FORWARD_PORT:-25433}:5432"

  lifegraph_web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-dev-key}
      DJANGO_DEBUG: "true"
      POSTGRES_HOST: lifegraph_db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://lifegraph_redis:6379/0
      USE_REDIS_CACHE: ${USE_REDIS_CACHE:-true}
    depends_on:
      lifegraph_db:
        condition: service_healthy
      lifegraph_redis:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "python manage.py runserver 0.0.0.0:8000",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3); sys.exit(0 if resp.status == 200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    volumes:
      - ./src:/app
    ports:
      - "${WEB_FORWARD_PORT:-28000}:8000"
